spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/policypulse
    username: postgres
    password: NewStrongPassword123!

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
    org.springframework.boot.context.config: DEBUG

aws:
  region: us-east-1
  s3:
    bucket-name: policy-pulse-documents-sivasai-2026

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB